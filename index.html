<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QUINTOPOS - Premium Glass</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #60a5fa;
            --primary-soft: rgba(59, 130, 246, 0.12);
            --primary-dark: #1d4ed8;
            --accent: #06b6d4;
            --accent-soft: rgba(6, 182, 212, 0.12);

            --bg-1: #f6f8fc;
            --bg-2: #edf4ff;
            --bg-3: #f8fbff;
            --bg-gradient: radial-gradient(circle at 15% 20%, rgba(96,165,250,0.18), transparent 28%),
                           radial-gradient(circle at 85% 18%, rgba(34,211,238,0.16), transparent 26%),
                           radial-gradient(circle at 70% 85%, rgba(59,130,246,0.10), transparent 28%),
                           linear-gradient(135deg, #f8fbff 0%, #eef4ff 45%, #f8fbfd 100%);

            --surface: rgba(255, 255, 255, 0.58);
            --surface-strong: rgba(255, 255, 255, 0.76);
            --surface-solid: rgba(255, 255, 255, 0.92);
            --surface-elevated: rgba(255,255,255,0.66);

            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-soft: #94a3b8;

            --border-glass: rgba(255, 255, 255, 0.58);
            --border-soft: rgba(148, 163, 184, 0.18);
            --border-strong: rgba(148, 163, 184, 0.24);

            --sidebar-bg: rgba(255, 255, 255, 0.34);
            --sidebar-active: linear-gradient(135deg, rgba(59,130,246,0.16), rgba(6,182,212,0.12));
            --sidebar-icon: #64748b;

            --checkout-rust: #2563eb;
            --checkout-green-bg: rgba(16, 185, 129, 0.08);
            --checkout-green-text: #047857;
            --checkout-btn-green: linear-gradient(135deg, #3b82f6, #06b6d4);
            --checkout-border: rgba(148, 163, 184, 0.16);

            --danger: #ef4444;
            --gold: #f59e0b;

            --shadow-xs: 0 2px 10px rgba(15, 23, 42, 0.04);
            --shadow-sm: 0 10px 30px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 18px 50px rgba(15, 23, 42, 0.09);
            --shadow-lg: 0 24px 70px rgba(15, 23, 42, 0.12);

            --blur-strong: blur(22px);
            --blur-soft: blur(14px);

            --radius-xs: 10px;
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 34px;
            --radius-pill: 999px;
            --radius-lg-modal: 28px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @media screen {
            html, body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                color: var(--text-main);
                position: fixed;
                inset: 0;
                background: var(--bg-gradient);
            }

            body::before,
            body::after {
                content: "";
                position: fixed;
                inset: auto;
                pointer-events: none;
                z-index: 0;
                border-radius: 999px;
                filter: blur(70px);
                opacity: 0.8;
            }

            body::before {
                width: 320px;
                height: 320px;
                top: -70px;
                left: -60px;
                background: rgba(96, 165, 250, 0.18);
            }

            body::after {
                width: 360px;
                height: 360px;
                right: -90px;
                bottom: -90px;
                background: rgba(34, 211, 238, 0.16);
            }
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.18s ease;
            font-family: inherit;
        }

        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }
        input, select { user-select: auto; }

        #app-root {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            z-index: 1;
            padding: 18px;
            gap: 18px;
        }

        .glass-panel {
            background: var(--surface);
            border: 1px solid var(--border-glass);
            backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
            box-shadow: var(--shadow-md);
        }

        #sidebar {
            width: 96px;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-glass);
            backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
            box-shadow: var(--shadow-md);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px 10px;
            gap: 16px;
            z-index: 50;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        #sidebar::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.24), rgba(255,255,255,0.04));
            pointer-events: none;
        }

        .brand-logo {
            color: var(--text-main);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1.8px;
            text-align: center;
            margin-bottom: 8px;
            opacity: 0.92;
            position: relative;
            z-index: 1;
        }

        .nav-btn {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: transparent;
            color: var(--sidebar-icon);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            gap: 7px;
            position: relative;
            z-index: 1;
        }

        .nav-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.34);
            color: var(--primary-dark);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
        }

        .nav-btn.active {
            background: var(--sidebar-active);
            color: var(--primary-dark);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 8px 24px rgba(59,130,246,0.10);
        }

        .nav-btn-z {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: transparent;
            color: var(--sidebar-icon);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            gap: 4px;
            position: relative;
            overflow: hidden;
            margin-top: auto;
            margin-bottom: 2px;
            z-index: 1;
        }

        .nav-btn-z:hover {
            background: rgba(255,255,255,0.34);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
        }

        .nav-btn-z .z-icon {
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            font-family: Georgia, 'Times New Roman', serif;
            background: linear-gradient(135deg, #f59e0b, #fbbf24, #fde68a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(245,158,11,0.28));
            line-height: 1;
        }

        .nav-btn-z .z-label {
            font-size: 9px;
            font-weight: 800;
            color: var(--text-soft);
            letter-spacing: 0.9px;
        }

        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            min-width: 0;
        }

        #mobile-header {
            display: none;
            padding: 16px 20px;
            background: rgba(255,255,255,0.42);
            backdrop-filter: var(--blur-soft);
            -webkit-backdrop-filter: var(--blur-soft);
            border: 1px solid var(--border-glass);
            border-radius: 22px;
            box-shadow: var(--shadow-sm);
            z-index: 20;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .mobile-brand {
            font-size: 17px;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: 1.4px;
        }

        .view {
            flex: 1;
            display: none;
            height: 100%;
            overflow: hidden;
            width: 100%;
            min-width: 0;
        }

        .view.active { display: flex; }
        #pos-view { flex-direction: row; width: 100%; gap: 18px; }

        #products-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow: hidden;
            min-width: 0;
            background: rgba(255,255,255,0.24);
            border: 1px solid var(--border-glass);
            backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong
